[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["git-lfs"]
installCmd = "git lfs install && git lfs pull && pip install -r requirements.txt"

[deploy]
startCommand = "cd app && python -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}"
healthcheckPath = "/api/stats"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
