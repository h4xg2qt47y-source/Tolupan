<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tol Dictionary — Tolupan ↔ English ↔ Español</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/dictionary.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app dict-app">
    <header>
      <h1><span class="logo-icon">🌿</span> Tol Dictionary</h1>
      <p class="subtitle">Search any word in Tol, English, or Spanish</p>
      <nav class="header-nav">
        <a href="/" class="nav-link">Translator</a>
        <a href="/dictionary" class="nav-link nav-active">Dictionary</a>
        <a href="/bible" class="nav-link">Dios Vele</a>
        <a href="/test" class="nav-link">Grammar Tests</a>
        <a href="/learn" class="nav-link">Aprende</a>
        <a href="/sources" class="nav-link">Sources</a>
      </nav>
    </header>

    <main>
      <div class="dict-stats" id="dict-stats"></div>

      <div class="search-bar">
        <div class="search-box">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="q" placeholder="Type a word — Tol, English, or Spanish…" autocomplete="off" autofocus />
          <button class="clear-btn" id="clear-btn">&times;</button>
        </div>
      </div>

      <div id="results-info" class="results-info"></div>
      <div id="results" class="results"></div>
      <div id="pagination" class="pagination"></div>

      <div class="word-overlay" id="word-overlay">
        <div class="word-panel" id="word-panel">
          <button class="panel-close" id="panel-close">&times;</button>
          <div id="panel-body"></div>
        </div>
      </div>
    </main>

    <footer>
      <p>Built to preserve and share the Tol (Tolupan) language of Honduras</p>
      <p class="small"><a href="/sources" style="color:inherit;text-decoration:underline">Sources</a>: Language Conservation Project · SIL International · ScriptureEarth · ELAR Archive</p>
    </footer>
  </div>
  <script src="/static/dictionary-app.js"></script>
</body>
</html>
